name: Monitor de Vacantes Sis. Maestro

on:
  schedule:
    # Ejecutar cada 15 minutos. 
    # (Los cron de GitHub usan UTC, asegúrate de que tu script maneje bien las zonas horarias si es crítico)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  monitorear:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4
      with:
        # Necesario para poder hacer push de la base de datos después
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 📝 Crear archivo de configuración desde Secretos
      env:
        # 1. Asignamos el secreto a una variable de entorno de Bash
        CONFIG_CONTENT: ${{ secrets.CONFIG_YAML }}
      run: |
        mkdir -p config
        mkdir -p data
        mkdir -p logs
        
        # 2. Usamos la variable de entorno entre comillas dobles
        # Esto es 100% seguro y respeta todos los caracteres especiales
        echo "$CONFIG_CONTENT" > config/config.yaml

    - name: 🚀 Ejecutar Monitor (Ciclo único)
      run: python main.py --once

    - name: 💾 Guardar Base de Datos en el Repositorio
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Agregar la base de datos
        git add data/vacantes.db
        
        # Solo hacer commit si la base de datos cambió
        if ! git diff --staged --quiet; then
          git commit -m "🔄 Actualización automática de vacantes.db [skip ci]"
          git push
          echo "✅ Base de datos actualizada en el repositorio."
        else
          echo "ℹ️ No hubo nuevas vacantes, la base de datos no cambió."
        fi
