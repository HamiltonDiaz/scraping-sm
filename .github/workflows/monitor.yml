name: Monitor de Vacantes

on:
  schedule:
    # Ejecutar cada 15 minutos (ajustar según necesidad)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Crear directorios de datos
        run: |
          mkdir -p data logs

      - name: Ejecutar monitor (ciclo único)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        run: |
          # Crear config.yaml dinámicamente con los secrets
          cat > config/config.yaml << EOF
          scraper:
            url: "https://sistemamaestro.mineducacion.gov.co/SistemaMaestro/busquedaVacantes.xhtml"
            interval_minutes: 15
            timeout: 30
            headless: true
          filtros:
            secretaria: null
            departamento: null
            municipio: null
            area: null
            tipo_priorizacion: null
          notificacion:
            tipo: "telegram"
            telegram:
              bot_token: "${TELEGRAM_BOT_TOKEN}"
              chat_id: "${TELEGRAM_CHAT_ID}"
            whatsapp:
              phone_number: "${WHATSAPP_PHONE}"
              api_key: "${WHATSAPP_API_KEY}"
          database:
            path: "data/vacantes.db"
            dias_retencion: 90
          logging:
            level: "INFO"
            file: "logs/monitor.log"
            max_size_mb: 10
          EOF

          python main.py --once

      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7